name: Create Onboarding Issues

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/onboarding-issues.yaml'
      - '.github/onboarding-issues/**'

permissions:
  contents: read
  issues: write

jobs:
  create-onboarding-issues:
    runs-on: ubuntu-latest
    if: github.event.repository.default_branch == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Create onboarding issues
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Check if there are any existing issues (open or closed)
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 1
            });

            if (existingIssues.length > 0) {
              console.log('Issues already exist in this repository. Skipping onboarding issue creation.');
              return;
            }

            // Read the issues configuration
            const issuesConfigPath = path.join(process.cwd(), '.github', 'onboarding-issues', 'issues.json');
            const issuesConfigContent = fs.readFileSync(issuesConfigPath, 'utf8');
            const config = JSON.parse(issuesConfigContent);

            // Read issue markdown files and create issues
            const issuesDir = path.join(process.cwd(), '.github', 'onboarding-issues');
            const issues = [];

            for (const issueConfig of config.issues) {
              const filePath = path.join(issuesDir, issueConfig.file);
              const body = fs.readFileSync(filePath, 'utf8');
              
              issues.push({
                title: issueConfig.title,
                body: body
              });
            }

            // Create issues
            for (const issue of issues) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body
              });
            }

            console.log('Created ' + issues.length + ' onboarding issues');
